<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="100" height="100" rx="18" fill="url(#bg)"/>

  <!-- Paper airplane pointing up — clean, no shading -->
  <polygon points="50,10 16,82 50,58" fill="#ffffff"/>
  <polygon points="50,10 84,82 50,58" fill="#93c5fd"/>

</svg>
